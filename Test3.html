<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Contact et Projet WhatsApp</title>
    <style>
        /* Styles de base pour rendre le formulaire propre */
        body { font-family: Arial, sans-serif; max-width: 400px; margin: 20px auto; padding: 10px; }
        .form-group { margin-bottom: 15px; display: flex; flex-direction: column; }
        label { font-weight: bold; margin-bottom: 5px; }
        input, select, textarea { padding: 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; }
        button { background-color: #25D366; color: white; border: none; padding: 12px; border-radius: 4px; font-size: 16px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; }
        button:hover { background-color: #128C7E; }
    </style>
</head>
<body>

    <h2>Détails du projet</h2>
    
    <form id="projectForm">
        <div class="form-group">
            <label Places for="clientName">Nom complet :</label>
            <input type="text" id="clientName" placeholder="Ex: Jean Mukendi" required>
        </div>

        <div class="form-group">
            <label for="projectType">Type de projet :</label>
            <select id="projectType" required>
                <option value="">-- Choisir une option --</option>
                <option value="Site Web">Site Web / Application</option>
                <option value="Design Graphique">Design Graphique</option>
                <option value="Marketing Digital">Marketing Digital</option>
                <option value="Autre">Autre projet</option>
            </select>
        </div>

        <div class="form-group">
            <label for="projectDesc">Description du projet :</label>
            <textarea id="projectDesc" rows="4" placeholder="Décrivez brièvement votre besoin..." required></textarea>
        </div>

        <!-- Le bouton remplace l'ancien lien texte -->
        <button type="submit">Envoyer les détails sur WhatsApp</button>
    </form>

    <script>
        document.getElementById('projectForm').addEventListener('submit', function(event) {
            // Empêche le rechargement par défaut de la page
            event.preventDefault();

            // 1. Récupération des valeurs saisies dans le formulaire
            const nom = document.getElementById('clientName').value;
            const typeProjet = document.getElementById('projectType').value;
            const description = document.getElementById('projectDesc').value;

            // 2. Construction du message d'accueil textuel
            const message = "Bonjour ! Voici les détails de mon projet :\n\n" +
                            "*Nom :* " + nom + "\n" +
                            "*Type :* " + typeProjet + "\n" +
                            "*Description :* " + description;

            // 3. Encodage du message pour le protocole d'URL
            const messageEncode = encodeURIComponent(message);

            // 4. Numéro de téléphone cible
            const telephone = "243906391126";

            // 5. Génération et ouverture du lien dynamique
            window.location.href = "whatsapp://send?phone=" + telephone + "&text=" + messageEncode;
        });
    </script>

</body>
</html>
