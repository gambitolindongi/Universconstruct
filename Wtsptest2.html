<!DOCTYPE html>
<html lang="fr">
<head>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact WhatsApp</title>
    <style>
        /* Styles pour centrer le bouton proprement sur l'écran */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh; /* Prend toute la hauteur de l'écran */
        }

        /* Style du bouton WhatsApp */
        .btn-whatsapp {
            background-color: #25D366;
            color: white;
            text-decoration: none; /* Supprime le soulignement du lien */
            padding: 16px 32px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 50px; /* Bords très arrondis pour un style moderne */
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
            display: inline-flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            transition: transform 0.2s ease, background-color 0.3s ease;
        }

        /* Effet au survol de la souris */
        .btn-whatsapp:hover {
            background-color: #128C7E;
            transform: scale(1.05); /* Légère animation de grossissement */
        }
    </style>
</head>

    <!-- BOUTON AVEC NUMÉRO ET TEXTE D'ACCUEIL PRÉ-REMPLI -->
